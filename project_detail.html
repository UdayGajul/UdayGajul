<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Uday Gajul</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Use same CSS for consistency -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: #000000;
            overflow-y: auto;
        }

        .project-detail-container {
            padding: 100px 5vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-btn {
            align-self: flex-start;
            margin-bottom: 2rem;
        }

        /* Heading + content block used in project descriptions */
        .detail-block {
            margin-bottom: 1.8rem;
        }

        .detail-block h4 {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .detail-block p {
            color: var(--text-color);
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="custom-cursor-label" id="custom-cursor-label">
        <span class="cursor-text"></span>
    </div>

    <div class="main-container">
        <div class="project-detail-container">
            <!-- Back Button (href is filled dynamically below) -->
            <a id="back-btn" href="index.html#projects" class="glass-btn project-btn hover-target back-btn">
                <i class="fas fa-arrow-left back-arrow"></i> Back
            </a>

            <!-- Title Outside -->
            <h1 class="section-title fade-up" id="display-project-title">Project Title</h1>

            <!-- Project Content -->
            <div class="glass-container fade-up">
                <p class="project-type" id="display-project-type" style="margin-top: 0; margin-bottom: 2rem;">Project
                    Detail</p>

                <div id="project-body">
                    <!-- filled dynamically by JS below -->
                </div>

                <br><br>
                <div id="project-buttons" class="social-container" style="justify-content: flex-start; flex-wrap: wrap; gap: 16px;">
                    <!-- filled dynamically by JS below -->
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Use same JS for cursor and animations -->
    <script src="script.js"></script>

    <script>
        // ── URL params ──────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const title   = urlParams.get('title');
        const type    = urlParams.get('type');
        const section = urlParams.get('section') || 'projects';

        // ── Page header ─────────────────────────────────────────
        if (title) document.getElementById('display-project-title').innerText = title;
        if (type)  document.getElementById('display-project-type').innerText  = type;

        // ── Project content map ─────────────────────────────────
        const projectContent = {
            'Production & Payroll Management System': [
                {
                    heading: 'Location',
                    text: 'Gajul Fabrics (Textile Industry)'
                },
                {
                    heading: 'The "Field" Objective',
                    text: 'To address inefficient manual tracking of production and worker salaries by developing a system that automates production management, reporting, and payroll processes.'
                },
                {
                    heading: 'Tools & Methodology',
                    text: 'Developed using Python with tkinter and ttkbootstrap for GUI, matplotlib for data visualization, and MySQL for database management. Implemented structured data handling, report generation, and salary management features.'
                },
                {
                    heading: 'My Role',
                    text: 'Sole developer responsible for designing the interface, implementing core functionalities, managing database integration, and ensuring smooth workflow automation.'
                },
                {
                    heading: 'Outcome & Deliverables',
                    text: 'Delivered a fully functional desktop application capable of managing production data, generating reports, and handling payroll, significantly improving efficiency, accuracy, and decision-making within operations.'
                }
            ]
        };

        // ── Project buttons map ─────────────────────────────────
        // Each entry: { sourceUrl, demo: { url, label } }
        // demo is optional — omit it for projects with no recording.
        const projectButtons = {
            'Production & Payroll Management System': {
                sourceUrl: 'https://github.com/UdayGajul/Production-and-Payroll-Management-System-PPMS',
                demo: {
                    url: 'https://drive.google.com/file/d/1c_41Su9tLBvBIuQfHahoBGvCcUxhg1FX/view?usp=sharing',
                    label: 'Screen Recording'
                }
            },
            'Satellite Tracking Mobile Application': {
                sourceUrl: 'https://github.com/UdayGajul/Satellite-Tracking-Mobile-Application',
                demo: {
                    url: '#',          // replace '#' with the actual recording link when ready
                    label: 'Screen Recording'
                }
            }
        };

        // ── Render content ──────────────────────────────────────
        const body    = document.getElementById('project-body');
        const blocks  = title ? projectContent[title] : null;

        if (blocks) {
            body.innerHTML = blocks.map(b =>
                `<div class="detail-block">
                    <h4>${b.heading}</h4>
                    <p>${b.text}</p>
                </div>`
            ).join('');
        } else {
            // Fallback placeholder for projects without specific content yet
            body.innerHTML = `
                <p>This is a detailed view of the selected project. Here you can find more information about the
                   technologies used, the challenges faced, and the final outcomes achieved during the project lifecycle.</p>
                <br>
                <p>The project focused on integrating advanced algorithms with a user-friendly interface. Key features
                   included real-time data processing, cinematic animations, and a robust backend architecture.</p>
            `;
        }

        // ── Render buttons ──────────────────────────────────────
        const btnContainer = document.getElementById('project-buttons');
        const btnConfig    = title ? projectButtons[title] : null;
        const sourceUrl    = btnConfig ? btnConfig.sourceUrl : '#';

        let buttonsHTML = `
            <a href="${sourceUrl}" ${sourceUrl !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''}
               class="glass-btn project-btn open-btn hover-target">
                Source Code <i class="fab fa-github" style="margin-left: 10px;"></i>
            </a>`;

        if (btnConfig && btnConfig.demo) {
            buttonsHTML += `
            <a href="${btnConfig.demo.url}" ${btnConfig.demo.url !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''}
               class="glass-btn project-btn open-btn hover-target">
                ${btnConfig.demo.label} <i class="fas fa-play" style="margin-left: 10px;"></i>
            </a>`;
        }

        btnContainer.innerHTML = buttonsHTML;

        // Re-attach cursor hover listeners to the newly injected buttons
        // (script.js ran querySelectorAll before these elements existed)
        if (typeof isMobile !== 'undefined' && !isMobile) {
            const cursorEl    = document.getElementById('custom-cursor');
            const cursorLblEl = document.getElementById('custom-cursor-label');
            const cursorTxtEl = cursorLblEl ? cursorLblEl.querySelector('.cursor-text') : null;

            btnContainer.querySelectorAll('a').forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    if (cursorEl)    cursorEl.classList.add('hover-effect');
                    if (cursorLblEl) cursorLblEl.classList.add('hover-effect');
                    // open-btn → show external-link icon
                    if (cursorTxtEl) cursorTxtEl.innerHTML = '<i class="fas fa-arrow-up-right-from-square" style="font-size:24px;"></i>';
                });
                btn.addEventListener('mouseleave', () => {
                    if (cursorEl)    cursorEl.classList.remove('hover-effect');
                    if (cursorLblEl) cursorLblEl.classList.remove('hover-effect');
                    if (cursorTxtEl) cursorTxtEl.innerHTML = '';
                });
            });
        }


        // ── Back navigation ─────────────────────────────────────
        const backTarget = 'index.html#' + section;
        document.getElementById('back-btn').setAttribute('href', backTarget);

        if (document.referrer && document.referrer.includes('index.html')) {
            history.replaceState(null, '', backTarget);
            history.pushState(null, '', window.location.href);
        }
    </script>
</body>

</html>
