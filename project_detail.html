<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Uday Gajul</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Use same CSS for consistency -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: transparent;
            overflow-y: auto;
        }

        .project-detail-container {
            padding: 100px 5vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-btn {
            align-self: flex-start;
            margin-bottom: 2rem;
        }

        /* Heading + content block used in project descriptions */
        .detail-block {
            margin-bottom: 1.8rem;
        }

        .detail-block h4 {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .detail-block p {
            color: var(--text-color);
            line-height: 1.8;
        }

        .project-list {
            list-style: none;
            padding: 0;
            margin: 1.5rem 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .project-list li {
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }

        .project-list li i {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="custom-cursor-label" id="custom-cursor-label">
        <span class="cursor-text"></span>
    </div>

    <div class="main-container">
        <div class="project-detail-container">
            <!-- Back Button (href is filled dynamically below) -->
            <a id="back-btn" href="index.html#projects" class="glass-btn project-btn hover-target back-btn">
                <i class="fas fa-arrow-left back-arrow"></i> Back
            </a>

            <!-- Title Outside -->
            <h1 class="section-title fade-up" id="display-project-title">Project Title</h1>

            <!-- Project Content -->
            <div class="glass-container fade-up">
                <p class="project-type" id="display-project-type" style="margin-top: 0; margin-bottom: 2rem;">Project
                    Detail</p>

                <div id="project-body">
                    <!-- filled dynamically by JS below -->
                </div>

                <br><br>
                <div id="project-buttons" class="social-container"
                    style="justify-content: flex-start; flex-wrap: wrap; gap: 16px;">
                    <!-- filled dynamically by JS below -->
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Custom Scrollbar -->
    <div class="custom-scrollbar-container" id="scrollbar-container">
        <div class="custom-scrollbar-thumb" id="scrollbar-thumb"></div>
    </div>

    <!-- Floating Hamburger Button -->
    <div class="hamburger-btn hover-target" id="hamburger-btn">
        <div class="hamburger-line line-1"></div>
        <div class="hamburger-line line-2"></div>
        <div class="hamburger-line line-3"></div>
    </div>

    <!-- Full Screen Menu Overlay -->
    <div class="full-screen-menu" id="full-screen-menu">
        <nav class="menu-nav-links">
            <a href="#hero" class="menu-link hover-target">Home</a>
            <a href="#about" class="menu-link hover-target">About</a>
            <a href="#projects" class="menu-link hover-target">Projects</a>
            <a href="#experience" class="menu-link hover-target">Experience</a>
            <a href="#awards" class="menu-link hover-target">Awards</a>
            <a href="#social" class="menu-link hover-target">Connect</a>
        </nav>
    </div>

    <!-- Use same JS for cursor and animations -->
    <script src="script.js"></script>

    <script>
        // ── URL params ──────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const title = urlParams.get('title');
        const type = urlParams.get('type');
        const section = urlParams.get('section') || 'projects';

        // ── Page header ─────────────────────────────────────────
        if (title) document.getElementById('display-project-title').innerText = title;
        if (type) document.getElementById('display-project-type').innerText = type;

        // ── Project content map ─────────────────────────────────
        const projectContent = {
            'Production & Payroll Management System': [
                {
                    heading: 'Location',
                    text: 'Gajul Fabrics (Textile Industry)'
                },
                {
                    heading: 'Objective',
                    text: 'To address inefficient manual tracking of production and worker salaries by developing a system that automates production management, reporting, and payroll processes.'
                },
                {
                    heading: 'Tools & Methodology',
                    text: 'Developed using Python with tkinter and ttkbootstrap for GUI, matplotlib for data visualization, and MySQL for database management. Implemented structured data handling, report generation, and salary management features.'
                },
                {
                    heading: 'My Role',
                    text: 'Sole developer responsible for designing the interface, implementing core functionalities, managing database integration, and ensuring smooth workflow automation.'
                },
                {
                    heading: 'Outcome & Deliverables',
                    text: 'Delivered a fully functional desktop application capable of managing production data, generating reports, and handling payroll, significantly improving efficiency, accuracy, and decision-making within operations.'
                }
            ],
            'Satellite Tracking Mobile Application': [
                {
                    heading: 'Problem',
                    text: 'Most existing satellite tracking apps primarily focus on the International Space Station (ISS) or offer limited access to other satellites, making it difficult for users to explore important satellites from different countries.'
                },
                {
                    heading: 'Goal',
                    text: 'This project aims to solve this by providing a mobile application that allows users to track top satellites from leading space-faring countries in real time through a simple and accessible interface.'
                },
                {
                    heading: 'Team Composition',
                    text: 'Collaborative Research Project with a team of 5.'
                },
                {
                    heading: 'Contribution',
                    text: 'I identified the core problem of limited satellite tracking tools, conducted the literature review, and planned the execution strategy for the app. I collected top satellite data, designed the Earth model, and worked with complex TLE (Two‑Line Element) data. I then displayed live satellite tracking on the Earth model and developed key components of the application.'
                },
                {
                    heading: 'Impact',
                    text: 'My work enabled the app to provide accurate real‑time satellite tracking beyond basic ISS tracking, addressing limitations of existing tools that only show basic or restricted satellite information. By processing complex TLE (Two‑Line Element) data and visualizing live satellite positions on the Earth model, I helped create a functional and engaging user experience that makes satellite tracking accessible and informative for users.'
                },
                {
                    heading: 'Tools',
                    text: 'Frontend: React Native for building the mobile app using JavaScript and native UI components.<br>Backend & Database: PHP running on XAMPP (Apache + MySQL) to handle server logic and database interactions.<br>API Testing & Development: Postman for creating, testing, and debugging the app\'s API endpoints.<br>3D Earth Visualization: Three.js for rendering the interactive 3D Earth model and satellite paths.<br>Satellite Orbit Data: Uses TLE data from CelesTrak to calculate and show satellite positions.'
                },
                {
                    heading: 'Reflection',
                    text: 'Working in a 5‑person team taught me how to communicate clearly, collaborate effectively, and support others while solving problems together. The experience felt like working in a real‑world company, helped me build teamwork, adaptability, and problem‑solving skills, and I\'m grateful for how we helped each other and would gladly work with my team again in the future.'
                }
            ]
        };

        // ── Project buttons map ─────────────────────────────────
        // Each entry: { sourceUrl, demo: { url, label } }
        // demo is optional — omit it for projects with no recording.
        const projectButtons = {
            'Production & Payroll Management System': {
                sourceUrl: 'https://github.com/UdayGajul/Production-and-Payroll-Management-System-PPMS',
                demo: {
                    url: 'https://drive.google.com/file/d/1kvbvbm62u4BETcT9jKTG2camp6Ighc5w/view?usp=sharing',
                    label: 'Screen Recording'
                }
            },
            'Satellite Tracking Mobile Application': {
                sourceUrl: 'https://github.com/UdayGajul/Satellite-Tracking-Mobile-Application',
                demo: {
                    url: 'https://drive.google.com/file/d/1E4NZC7l2Brp3kgeeWhfFwSb5PxlDdALx/view?usp=sharing',
                    label: 'Screen Recording'
                }
            },
            'Mini-Projects': {
                sourceUrl: 'https://github.com/UdayGajul/Mini-Projects',
                certificateUrl: 'https://www.udemy.com/certificate/UC-d9e2081b-2630-4cb8-a533-6d421421304f/'
            }
        };

        // ── Render content ──────────────────────────────────────
        const body = document.getElementById('project-body');
        const blocks = title ? projectContent[title] : null;

        if (blocks) {
            body.innerHTML = blocks.map(b =>
                `<div class="detail-block">
                    <h4>${b.heading}</h4>
                    <p>${b.text}</p>
                </div>`
            ).join('');
        } else {
            // Fallback placeholder for projects without specific content yet
            body.innerHTML = `
                <div class="detail-block">
                    <p>While I was working as a Production Manager for Gajul Fabrics, I didn't give up on the tech field. I <strong>successfully completed</strong> the <strong>'100 Days of Code™: The Complete Python Pro Bootcamp'</strong> by Angela Yu. Through this course, I created many mini-projects that showcase my Python skills and helped me gain a solid grasp of the language.</p>
                </div>
                <div class="detail-block">
                    <h4>Included Projects</h4>
                    <ul class="project-list">
                        <li><i class="fas fa-chevron-right"></i> Add Watermark to Images</li>
                        <li><i class="fas fa-chevron-right"></i> Automated Price Tracker</li>
                        <li><i class="fas fa-chevron-right"></i> Birthday Wisher</li>
                        <li><i class="fas fa-chevron-right"></i> Color Extractor</li>
                        <li><i class="fas fa-chevron-right"></i> Instagram Follower Bot</li>
                        <li><i class="fas fa-chevron-right"></i> Internet Speed Twitter (X) Complaint Bot</li>
                        <li><i class="fas fa-chevron-right"></i> PDF to Speech</li>
                        <li><i class="fas fa-chevron-right"></i> Pomodoro</li>
                        <li><i class="fas fa-chevron-right"></i> Random Password Generator</li>
                        <li><i class="fas fa-chevron-right"></i> Stock Trading News Alert</li>
                        <li><i class="fas fa-chevron-right"></i> Text to Morse Code and Morse Code to Text</li>
                        <li><i class="fas fa-chevron-right"></i> Tic Tac Toe Game</li>
                        <li><i class="fas fa-chevron-right"></i> Workout Tracking Using Google Sheets</li>
                    </ul>
                </div>
                <div class="detail-block">
                    <p>You can view them by clicking the button below to visit my GitHub page.</p>
                </div>
            `;
        }

        // ── Render buttons ──────────────────────────────────────
        const btnContainer = document.getElementById('project-buttons');
        const btnConfig = title ? projectButtons[title] : null;
        const sourceUrl = btnConfig ? btnConfig.sourceUrl : '#';

        let buttonsHTML = `
            <a href="${sourceUrl}" ${sourceUrl !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''}
               class="glass-btn project-btn open-btn hover-target">
                Source Code <i class="fab fa-github" style="margin-left: 10px;"></i>
            </a>`;

        if (btnConfig && btnConfig.demo) {
            buttonsHTML += `
            <a href="${btnConfig.demo.url}" ${btnConfig.demo.url !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''}
               class="glass-btn project-btn open-btn hover-target">
                ${btnConfig.demo.label} <i class="fas fa-play" style="margin-left: 10px;"></i>
            </a>`;
        }

        if (btnConfig && btnConfig.certificateUrl) {
            buttonsHTML += `
            <a href="${btnConfig.certificateUrl}" target="_blank" rel="noopener noreferrer"
               class="glass-btn project-btn open-btn hover-target">
                View Certificate <i class="fas fa-certificate" style="margin-left: 10px;"></i>
            </a>`;
        }

        btnContainer.innerHTML = buttonsHTML;

        // Re-attach cursor hover listeners to the newly injected buttons
        // (script.js ran querySelectorAll before these elements existed)
        if (typeof isMobile !== 'undefined' && !isMobile) {
            const cursorEl = document.getElementById('custom-cursor');
            const cursorLblEl = document.getElementById('custom-cursor-label');
            const cursorTxtEl = cursorLblEl ? cursorLblEl.querySelector('.cursor-text') : null;

            btnContainer.querySelectorAll('a').forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    if (cursorEl) cursorEl.classList.add('hover-effect');
                    if (cursorLblEl) cursorLblEl.classList.add('hover-effect');
                    // open-btn → show external-link icon
                    if (cursorTxtEl) cursorTxtEl.innerHTML = '<i class="fas fa-arrow-up-right-from-square" style="font-size:24px;"></i>';
                });
                btn.addEventListener('mouseleave', () => {
                    if (cursorEl) cursorEl.classList.remove('hover-effect');
                    if (cursorLblEl) cursorLblEl.classList.remove('hover-effect');
                    if (cursorTxtEl) cursorTxtEl.innerHTML = '';
                });
            });
        }


        // ── Back navigation ─────────────────────────────────────
        const backTarget = 'index.html#' + section;
        const backBtn = document.getElementById('back-btn');
        backBtn.setAttribute('href', backTarget);

        // Save which section to scroll to, so index.html can restore it on back-navigation
        backBtn.addEventListener('click', () => {
            sessionStorage.setItem('returnSection', section);
        });
    </script>
</body>

</html>
