<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Award Details - Uday Gajul</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Use same CSS for consistency -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: transparent;
            overflow-y: auto;
        }

        .award-detail-container {
            padding: 100px 5vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-btn {
            align-self: flex-start;
            margin-bottom: 2rem;
        }

        .awards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            margin-bottom: 2rem;
        }

        .award-image-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .award-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--trans-smooth);
        }

        .award-image:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .award-image-wrapper {
            position: relative;
            cursor: none;
            width: 100%;
            aspect-ratio: 16 / 11;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .detail-block {
            margin-bottom: 1.8rem;
        }

        .detail-block h4 {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .detail-block p {
            color: var(--text-color);
            line-height: 1.8;
        }

        /* Modal for Image Preview */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 1000px;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {transform:scale(0.8); opacity:0}
            to {transform:scale(1); opacity:1}
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 10;
        }

        .close-modal:hover,
        .close-modal:focus {
            color: #bbb;
            text-decoration: none;
            cursor: pointer;
        }

    </style>
</head>

<body>
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="custom-cursor-label" id="custom-cursor-label">
        <span class="cursor-text"></span>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="modal">
        <span class="close-modal hover-target">&times;</span>
        <img class="modal-content" id="modal-img">
    </div>

    <div class="main-container">
        <div class="award-detail-container">
            <!-- Back Button -->
            <a id="back-btn" href="index.html#awards" class="glass-btn project-btn hover-target back-btn">
                <i class="fas fa-arrow-left back-arrow"></i> Back
            </a>

            <!-- Title Outside -->
            <h1 class="section-title fade-up" id="display-award-title">Award Title</h1>
            
            <!-- Unified Award Box -->
            <div class="glass-container fade-up" style="max-width: 1000px; width: 100%; margin: 2rem auto 0 auto;">
                <p class="project-type" id="display-award-type" style="margin-top: 0; margin-bottom: 2rem; text-align: left;">Award</p>

                <!-- Award Images Grid -->
                <div class="awards-grid" id="awards-images-container">
                    <!-- Filled dynamically by JS -->
                </div>
                
                <!-- Details -->
                <div id="award-body">
                    <!-- Filled dynamically by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Custom Scrollbar -->
    <div class="custom-scrollbar-container" id="scrollbar-container">
        <div class="custom-scrollbar-thumb" id="scrollbar-thumb"></div>
    </div>

    <!-- Floating Hamburger Button -->
    <div class="hamburger-btn hover-target" id="hamburger-btn">
        <div class="hamburger-line line-1"></div>
        <div class="hamburger-line line-2"></div>
        <div class="hamburger-line line-3"></div>
    </div>

    <!-- Full Screen Menu Overlay -->
    <div class="full-screen-menu" id="full-screen-menu">
        <nav class="menu-nav-links">
            <a href="#hero" class="menu-link hover-target">Home</a>
            <a href="#about" class="menu-link hover-target">About</a>
            <a href="#projects" class="menu-link hover-target">Projects</a>
            <a href="#experience" class="menu-link hover-target">Experience</a>
            <a href="#awards" class="menu-link hover-target">Awards</a>
            <a href="#social" class="menu-link hover-target">Connect</a>
        </nav>
    </div>

    <!-- JS -->
    <script src="script.js"></script>

    <script>
        // ── URL params ──────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const title = urlParams.get('title');
        const type = urlParams.get('type') || 'Award';
        const section = urlParams.get('section') || 'awards';

        // ── Page header ─────────────────────────────────────────
        if (title) document.getElementById('display-award-title').innerText = title;
        if (type) document.getElementById('display-award-type').innerText = type;

        // ── Content map ─────────────────────────────────
        const awardContent = {
            'First Prize in Paper Presentation': {
                blocks: [
                    { heading: 'Award', text: 'First Prize' },
                    { heading: 'Year', text: '2025' },
                    { heading: 'Competition', text: 'Dexter Innofest 2025' },
                    { heading: 'Description', text: 'Secured the first position in a national-level paper presentation competition at <strong>Dexter Innofest 2025</strong>. The presentation focused on demonstrating innovative research and technical depth in the field of aerospace technology.' }
                ],
                images: [
                    { src: 'assets/Dexter_Innofest_First_Prize_Certificate.jpg', caption: 'Award Certificate' },
                    { src: 'assets/Dexter_Innofest_2025_First_Prize_Award.jpg', caption: 'Award Presentation' }
                ]
            },
            'Second Prize in Paper Presentation': {
                blocks: [
                    { heading: 'Award', text: 'Second Prize' },
                    { heading: 'Year', text: '2024' },
                    { heading: 'Competition', text: 'Dexter Innofest 2024' },
                    { heading: 'Description', text: 'Achieved the second prize at <strong>Dexter Innofest 2024</strong> for an outstanding paper presentation. This recognition was awarded for technical clarity, research methodologies, and effective communication of complex concepts.' }
                ],
                images: [
                    { src: 'assets/Dexter_Innofest_Second_Prize_Cetificate.jpg', caption: 'Award Certificate' },
                    { src: 'assets/Dexter_Innofest_2024_Second_Prize_Award.jpg', caption: 'Award Presentation' }
                ]
            }
        };

        const body = document.getElementById('award-body');
        const imagesContainer = document.getElementById('awards-images-container');
        const data = title ? awardContent[title] : null;

        if (data) {
            // Render blocks
            if (data.blocks) {
                body.innerHTML = data.blocks.map(b =>
                    '<div class="detail-block"><h4>' + b.heading + '</h4><p>' + b.text + '</p></div>'
                ).join('');
            }

            // Render Images
            if (data.images && data.images.length > 0) {
                imagesContainer.innerHTML = data.images.map((img, index) => `
                    <div class="award-image-card">
                        <h4 style="font-family: var(--font-heading); font-size: 1.1rem; letter-spacing: 1px;">${img.caption}</h4>
                        <div class="award-image-wrapper hover-target view-image-btn" data-img-index="${index}">
                            <img src="${img.src}" alt="${img.caption}" class="award-image">
                        </div>
                    </div>
                `).join('');

                // Modal Logic
                const modal = document.getElementById("image-modal");
                const modalImg = document.getElementById("modal-img");
                const closeBtn = document.getElementsByClassName("close-modal")[0];

                document.querySelectorAll('.award-image-wrapper').forEach(wrapper => {
                    wrapper.onclick = function() {
                        const imgIndex = this.getAttribute('data-img-index');
                        modal.style.display = "flex";
                        modalImg.src = data.images[imgIndex].src;
                        document.body.style.overflow = "hidden";
                    }
                });

                closeBtn.onclick = function() {
                    modal.style.display = "none";
                    document.body.style.overflow = "auto";
                }
                
                modal.onclick = function(e) {
                    if (e.target !== modalImg) {
                        modal.style.display = "none";
                        document.body.style.overflow = "auto";
                    }
                }
            }
        } else {
            body.innerHTML = '<p>Award details not available.</p>';
        }

        // ── Back navigation ─────────────────────────────────────
        const backTarget = 'index.html#' + section;
        const backBtn = document.getElementById('back-btn');
        backBtn.setAttribute('href', backTarget);

        backBtn.addEventListener('click', () => {
            sessionStorage.setItem('returnSection', section);
        });

        // ── Add cursor hover effect to the images ────────────────
        if (typeof isMobile !== 'undefined' && !isMobile) {
            const cursorEl = document.getElementById('custom-cursor');
            const cursorLblEl = document.getElementById('custom-cursor-label');
            const cursorTxtEl = cursorLblEl ? cursorLblEl.querySelector('.cursor-text') : null;

            document.querySelectorAll('.view-image-btn').forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    if (cursorEl) cursorEl.classList.add('hover-effect');
                    if (cursorLblEl) cursorLblEl.classList.add('hover-effect');
                    if (cursorTxtEl) cursorTxtEl.innerHTML = '<i class="fas fa-search-plus" style="font-size:24px;"></i>';
                });
                btn.addEventListener('mouseleave', () => {
                    if (cursorEl) cursorEl.classList.remove('hover-effect');
                    if (cursorLblEl) cursorLblEl.classList.remove('hover-effect');
                    if (cursorTxtEl) cursorTxtEl.innerHTML = '';
                });
            });
        }
    </script>
</body>
</html>
